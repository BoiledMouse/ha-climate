# Keeps the attic office at a configurable target (~24 °C) while running the
# portable AC as little as possible. Prefers free cooling (open window + fan)
# when outdoor air is cooler, pre-cools before the work day, and sends mobile
# prompts to open/close the window.

# ---- Tunable helpers -------------------------------------------------------
input_number:
  attic_target_temp:
    name: Attic target temperature
    min: 18
    max: 28
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    initial: 24
  attic_temp_tolerance:          # hysteresis half-band
    name: Attic temperature tolerance
    min: 0.2
    max: 3
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:arrow-expand-vertical
    initial: 0.5
  attic_free_cooling_delta:      # outdoor must be this far below room to free-cool
    name: Attic free-cooling delta
    min: 0.5
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:weather-windy
    initial: 1.5
  attic_precool_offset:          # how far below target to pre-cool
    name: Attic pre-cool offset
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:snowflake
    initial: 1
  attic_freecool_giveup_minutes: # how long to wait for free cooling before using the AC (pre-cool only)
    name: Attic free-cooling give-up minutes
    min: 5
    max: 120
    step: 5
    unit_of_measurement: min
    icon: mdi:timer-sand
    initial: 20

input_boolean:
  attic_climate_control:
    name: Attic climate automation enabled
    icon: mdi:home-thermometer
  attic_precool_ac_override:     # latch: gave up on free cooling, allow AC for the rest of pre-cool
    name: Attic pre-cool AC override
    icon: mdi:air-conditioner

timer:
  attic_freecool_giveup:
    name: Attic free-cooling give-up timer
    restore: true

input_datetime:
  attic_office_precool_start:
    name: Attic pre-cool start time
    has_date: false
    has_time: true
    initial: "06:00:00"
  attic_office_start:
    name: Attic office start time
    has_date: false
    has_time: true
    initial: "08:00:00"
  attic_office_end:
    name: Attic office end time
    has_date: false
    has_time: true
    initial: "18:00:00"

# ---- Derived values (template) --------------------------------------------
template:
  - sensor:
      - name: Attic effective target temperature
        unique_id: attic_effective_target_temperature
        unit_of_measurement: "°C"
        state: >-
          {% set t = states('input_number.attic_target_temp') | float(24) %}
          {% set off = states('input_number.attic_precool_offset') | float(1) %}
          {% set ps = today_at(states('input_datetime.attic_office_precool_start')) %}
          {% set ws = today_at(states('input_datetime.attic_office_start')) %}
          {{ (t - off) if (ps <= now() < ws) else t }}
  - binary_sensor:
      - name: Attic open window hint
        unique_id: attic_open_window_hint
        # Warm room, window shut, outside cool enough to free-cool.
        state: >-
          {% set indoor = states('sensor.attic_environment_temperature') | float(none) %}
          {% set outdoor = states('sensor.hue_outdoor_motion_sensor_1_temperature') | float(none) %}
          {% set tgt = states('sensor.attic_effective_target_temperature') | float(none) %}
          {% set tol = states('input_number.attic_temp_tolerance') | float(0.5) %}
          {% set delta = states('input_number.attic_free_cooling_delta') | float(1.5) %}
          {% set ps = today_at(states('input_datetime.attic_office_precool_start')) %}
          {% set we = today_at(states('input_datetime.attic_office_end')) %}
          {{ (ps <= now() <= we)
             and is_state('binary_sensor.attic_window_contact','off')
             and is_state('input_boolean.attic_precool_ac_override','off')
             and indoor is not none and tgt is not none and outdoor is not none
             and indoor >= (tgt + tol) and outdoor < (indoor - delta) }}
      - name: Attic close window hint
        unique_id: attic_close_window_hint
        # Warm room, window open, but outside NOT cooler -> AC is blocked.
        state: >-
          {% set indoor = states('sensor.attic_environment_temperature') | float(none) %}
          {% set outdoor = states('sensor.hue_outdoor_motion_sensor_1_temperature') | float(none) %}
          {% set tgt = states('sensor.attic_effective_target_temperature') | float(none) %}
          {% set tol = states('input_number.attic_temp_tolerance') | float(0.5) %}
          {% set delta = states('input_number.attic_free_cooling_delta') | float(1.5) %}
          {% set ps = today_at(states('input_datetime.attic_office_precool_start')) %}
          {% set we = today_at(states('input_datetime.attic_office_end')) %}
          {{ (ps <= now() <= we)
             and is_state('binary_sensor.attic_window_contact','on')
             and indoor is not none and tgt is not none and outdoor is not none
             and indoor >= (tgt + tol) and not (outdoor < (indoor - delta)) }}
      - name: Attic precool freecooling active
        unique_id: attic_precool_freecooling_active
        # In the pre-cool period, room is too warm and outside is cooler -> we are
        # (or should be) free-cooling. Runs the give-up countdown. Window-agnostic.
        state: >-
          {% set indoor = states('sensor.attic_environment_temperature') | float(none) %}
          {% set outdoor = states('sensor.hue_outdoor_motion_sensor_1_temperature') | float(none) %}
          {% set tgt = states('sensor.attic_effective_target_temperature') | float(none) %}
          {% set tol = states('input_number.attic_temp_tolerance') | float(0.5) %}
          {% set delta = states('input_number.attic_free_cooling_delta') | float(1.5) %}
          {% set ps = today_at(states('input_datetime.attic_office_precool_start')) %}
          {% set ws = today_at(states('input_datetime.attic_office_start')) %}
          {{ (ps <= now() < ws)
             and indoor is not none and tgt is not none and outdoor is not none
             and indoor >= (tgt + tol) and outdoor < (indoor - delta) }}
      - name: Attic precool close window hint
        unique_id: attic_precool_close_window_hint
        # Gave up on free cooling, but the window is still open -> nudge to close it
        # so the AC can take over.
        state: >-
          {% set indoor = states('sensor.attic_environment_temperature') | float(none) %}
          {% set tgt = states('sensor.attic_effective_target_temperature') | float(none) %}
          {% set tol = states('input_number.attic_temp_tolerance') | float(0.5) %}
          {% set ps = today_at(states('input_datetime.attic_office_precool_start')) %}
          {% set ws = today_at(states('input_datetime.attic_office_start')) %}
          {{ (ps <= now() < ws)
             and is_state('input_boolean.attic_precool_ac_override','on')
             and is_state('binary_sensor.attic_window_contact','on')
             and indoor is not none and tgt is not none
             and indoor >= (tgt + tol) }}

# ---- Automations -----------------------------------------------------------
automation:
  # Equipment control
  - id: attic_office_climate_control
    alias: Attic office climate control
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id:
          - sensor.attic_environment_temperature
          - sensor.hue_outdoor_motion_sensor_1_temperature
          - binary_sensor.attic_window_contact
          - input_boolean.attic_climate_control
      - platform: time_pattern
        minutes: "/5"
      - platform: time
        at:
          - input_datetime.attic_office_precool_start
          - input_datetime.attic_office_start
          - input_datetime.attic_office_end
    variables:
      indoor: "{{ states('sensor.attic_environment_temperature') | float(none) }}"
      outdoor: "{{ states('sensor.hue_outdoor_motion_sensor_1_temperature') | float(none) }}"
      eff_target: "{{ states('sensor.attic_effective_target_temperature') | float(none) }}"
      tol: "{{ states('input_number.attic_temp_tolerance') | float(0.5) }}"
      delta: "{{ states('input_number.attic_free_cooling_delta') | float(1.5) }}"
      on_threshold: "{{ eff_target + tol }}"
      off_threshold: "{{ eff_target - tol }}"
      window_open: "{{ is_state('binary_sensor.attic_window_contact','on') }}"
      free_cooling: "{{ outdoor is not none and indoor is not none and outdoor < (indoor - delta) }}"
      active: >-
        {{ today_at(states('input_datetime.attic_office_precool_start')) <= now()
           <= today_at(states('input_datetime.attic_office_end')) }}
      in_precool: >-
        {{ today_at(states('input_datetime.attic_office_precool_start')) <= now()
           < today_at(states('input_datetime.attic_office_start')) }}
    condition:
      - condition: state
        entity_id: input_boolean.attic_climate_control
        state: "on"
      - "{{ indoor is not none and eff_target is not none }}"
    # Every device call is guarded with `if/then` so a command is only sent when
    # the device is NOT already in the desired state. This stops the AC beeping
    # on every 5-minute re-evaluation (the Pro Breeze beeps on each command).
    action:
      - choose:
          - conditions: "{{ not active }}"                       # 1) outside window
            sequence:
              - if: "{{ not is_state('climate.pro_breeze_12000_btu_air_conditioner','off') }}"
                then:
                  - service: climate.set_hvac_mode
                    target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                    data: {hvac_mode: "off"}
              - if: "{{ is_state('switch.attic_fan','on') }}"
                then:
                  - service: switch.turn_off
                    target: {entity_id: switch.attic_fan}
          - conditions: "{{ in_precool and is_state('input_boolean.attic_precool_ac_override','on') }}"
            # 1b) Pre-cool give-up: free cooling has been tried for the give-up
            # window and it's still too warm -> use the AC for the rest of pre-cool.
            sequence:
              - choose:
                  - conditions: "{{ window_open }}"             # AC blocked; nudge to close (push elsewhere)
                    sequence:
                      - if: "{{ not is_state('climate.pro_breeze_12000_btu_air_conditioner','off') }}"
                        then:
                          - service: climate.set_hvac_mode
                            target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                            data: {hvac_mode: "off"}
                      - if: "{{ is_state('switch.attic_fan','off') }}"
                        then:
                          - service: switch.turn_on
                            target: {entity_id: switch.attic_fan}
                default:                                         # window closed -> AC (hysteresis), fan off
                  - choose:
                      - conditions: "{{ indoor >= on_threshold }}"
                        sequence:
                          - if: >-
                              {{ not (is_state('climate.pro_breeze_12000_btu_air_conditioner','cool')
                                 and state_attr('climate.pro_breeze_12000_btu_air_conditioner','temperature') | float(none) == eff_target) }}
                            then:
                              - service: climate.set_temperature
                                target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                                data:
                                  hvac_mode: cool
                                  temperature: "{{ eff_target }}"
                          - if: "{{ is_state('switch.attic_fan','on') }}"
                            then:
                              - service: switch.turn_off
                                target: {entity_id: switch.attic_fan}
                      - conditions: "{{ indoor <= off_threshold }}"
                        sequence:
                          - if: "{{ not is_state('climate.pro_breeze_12000_btu_air_conditioner','off') }}"
                            then:
                              - service: climate.set_hvac_mode
                                target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                                data: {hvac_mode: "off"}
                          - if: "{{ is_state('switch.attic_fan','on') }}"
                            then:
                              - service: switch.turn_off
                                target: {entity_id: switch.attic_fan}
                    # deadband: leave equipment as-is
          - conditions: "{{ window_open }}"                      # 2) window open
            sequence:
              - if: "{{ not is_state('climate.pro_breeze_12000_btu_air_conditioner','off') }}"
                then:
                  - service: climate.set_hvac_mode
                    target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                    data: {hvac_mode: "off"}
              - if: "{{ indoor >= on_threshold and free_cooling }}"
                then:
                  - if: "{{ is_state('switch.attic_fan','off') }}"
                    then:
                      - service: switch.turn_on
                        target: {entity_id: switch.attic_fan}
                else:
                  - if: "{{ is_state('switch.attic_fan','on') }}"
                    then:
                      - service: switch.turn_off
                        target: {entity_id: switch.attic_fan}
          - conditions: "{{ indoor >= on_threshold and free_cooling }}"  # 3) free cool
            sequence:
              - if: "{{ not is_state('climate.pro_breeze_12000_btu_air_conditioner','off') }}"
                then:
                  - service: climate.set_hvac_mode
                    target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                    data: {hvac_mode: "off"}
              - if: "{{ is_state('switch.attic_fan','off') }}"
                then:
                  - service: switch.turn_on
                    target: {entity_id: switch.attic_fan}
          - conditions: "{{ indoor >= on_threshold }}"          # 4) run AC
            sequence:
              - if: >-
                  {{ not (is_state('climate.pro_breeze_12000_btu_air_conditioner','cool')
                     and state_attr('climate.pro_breeze_12000_btu_air_conditioner','temperature') | float(none) == eff_target) }}
                then:
                  - service: climate.set_temperature
                    target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                    data:
                      hvac_mode: cool
                      temperature: "{{ eff_target }}"
              - if: "{{ is_state('switch.attic_fan','on') }}"    # fan off while AC cools (too noisy together)
                then:
                  - service: switch.turn_off
                    target: {entity_id: switch.attic_fan}
          - conditions: "{{ indoor <= off_threshold }}"         # 5) cool enough
            sequence:
              - if: "{{ not is_state('climate.pro_breeze_12000_btu_air_conditioner','off') }}"
                then:
                  - service: climate.set_hvac_mode
                    target: {entity_id: climate.pro_breeze_12000_btu_air_conditioner}
                    data: {hvac_mode: "off"}
              - if: "{{ is_state('switch.attic_fan','on') }}"
                then:
                  - service: switch.turn_off
                    target: {entity_id: switch.attic_fan}
        # No default -> dead-band keeps current state (anti short-cycle).

  # Pre-cool free-cooling give-up: after N minutes of unsuccessful free cooling,
  # latch the AC override so the AC runs for the rest of the pre-cool period.
  - id: attic_precool_freecool_giveup
    alias: Attic pre-cool free-cooling give-up
    mode: queued
    trigger:
      - platform: state
        entity_id: binary_sensor.attic_precool_freecooling_active
        to: "on"
        id: start
      - platform: state
        entity_id: binary_sensor.attic_precool_freecooling_active
        to: "off"
        id: stop
      - platform: event
        event_type: timer.finished
        event_data: {entity_id: timer.attic_freecool_giveup}
        id: giveup
      - platform: time
        at: input_datetime.attic_office_start          # end of pre-cool -> reset
        id: precool_end
    condition:
      - condition: state
        entity_id: input_boolean.attic_climate_control
        state: "on"
    action:
      - choose:
          - conditions: >-
              {{ trigger.id == 'start'
                 and is_state('input_boolean.attic_precool_ac_override','off') }}
            sequence:
              - service: timer.start
                target: {entity_id: timer.attic_freecool_giveup}
                data:
                  duration: "{{ (states('input_number.attic_freecool_giveup_minutes') | int(20)) * 60 }}"
          - conditions: "{{ trigger.id == 'stop' }}"
            sequence:
              - service: timer.cancel
                target: {entity_id: timer.attic_freecool_giveup}
          - conditions: "{{ trigger.id == 'giveup' }}"
            sequence:
              - service: input_boolean.turn_on
                target: {entity_id: input_boolean.attic_precool_ac_override}
          - conditions: "{{ trigger.id == 'precool_end' }}"
            sequence:
              - service: input_boolean.turn_off
                target: {entity_id: input_boolean.attic_precool_ac_override}
              - service: timer.cancel
                target: {entity_id: timer.attic_freecool_giveup}

  # Window prompts (mobile push, transition-based)
  - id: attic_office_window_prompts
    alias: Attic office window prompts
    mode: queued
    trigger:
      - platform: state
        entity_id: binary_sensor.attic_open_window_hint
        to: "on"
        for: {minutes: 2}
        id: open
      - platform: state
        entity_id: binary_sensor.attic_close_window_hint
        to: "on"
        for: {minutes: 2}
        id: close
      - platform: state
        entity_id: binary_sensor.attic_precool_close_window_hint
        to: "on"
        for: {minutes: 2}
        id: precool_close
    condition:
      - condition: state
        entity_id: input_boolean.attic_climate_control
        state: "on"
    action:
      - choose:
          - conditions: "{{ trigger.id == 'open' }}"
            sequence:
              - service: notify.mobile_app_kens_iphone
                data:
                  title: "Attic office — open the window"
                  message: >-
                    {{ states('sensor.attic_environment_temperature') }}°C inside vs
                    {{ states('sensor.hue_outdoor_motion_sensor_1_temperature') }}°C outside —
                    open the attic window to cool down without the AC.
                  data: {tag: attic_window}
          - conditions: "{{ trigger.id == 'close' }}"
            sequence:
              - service: notify.mobile_app_kens_iphone
                data:
                  title: "Attic office — close the window"
                  message: >-
                    Window is open but it's warmer outside
                    ({{ states('sensor.hue_outdoor_motion_sensor_1_temperature') }}°C) —
                    close it so the AC can cool the room.
                  data: {tag: attic_window}
          - conditions: "{{ trigger.id == 'precool_close' }}"
            sequence:
              - service: notify.mobile_app_kens_iphone
                data:
                  title: "Attic office — close the window for the AC"
                  message: >-
                    Free cooling hasn't cooled the office enough — close the attic
                    window and the AC will take over for the rest of the pre-cool period.
                  data: {tag: attic_window}
